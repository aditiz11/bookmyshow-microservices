server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:

          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: movie-service
              uri: lb://movie-service
              predicates:
                - Path=/api/movies/**

            - id: booking-service
              uri: lb://booking-service
              predicates:
                - Path=/api/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true