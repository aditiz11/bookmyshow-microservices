server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/api/users/**

            - id: movie-service
              uri: http://movie-service:8082
              predicates:
                - Path=/api/movies/**

            - id: booking-service
              uri: http://booking-service:8083
              predicates:
                - Path=/api/bookings/**

management:
  endpoints:
    web:
      exposure:
        include: "*"