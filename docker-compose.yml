services:
  kafka:

    image: apache/kafka:latest

    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  redis:

    image: redis:7

    container_name: redis

    ports:
      - "6379:6379"

  mysql:

    image: mysql:8.4

    container_name: bookmyshow-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: password123

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:

    image: bookmyshow/user-service:v1

    container_name: user-service

    ports:
      - "8081:8081"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    depends_on:
      - mysql

  movie-service:

    image: bookmyshow/movie-service:v1

    container_name: movie-service

    ports:
      - "8082:8082"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    depends_on:
      - mysql

  booking-service:

    image: bookmyshow/booking-service:v1

    container_name: booking-service

    ports:
      - "8083:8083"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    depends_on:
      - mysql

  payment-service:

    image: bookmyshow/payment-service:v1

    container_name: payment-service

    ports:
      - "8086:8086"

    depends_on:
      - mysql
      - kafka

    environment:
      SPRING_PROFILES_ACTIVE: docker

  api-gateway:

    image: bookmyshow/api-gateway:v1

    container_name: api-gateway

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

    depends_on:
      - user-service
      - movie-service
      - booking-service

  notification-service:

    image: bookmyshow/notification-service:v1

    container_name: notification-service

    ports:
      - "8085:8084"

    depends_on:
      - kafka

    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mysql-data: